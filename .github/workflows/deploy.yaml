name: Deploy to shinyapps.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rsconnect
            any::shiny
            any::bslib
            any::dplyr
            any::leaflet
            
      - name: Authorize and Deploy Application
        env:
          ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          library(rsconnect)
          setAccountInfo(name = Sys.getenv("ACCOUNT"), token = Sys.getenv("TOKEN"), secret = Sys.getenv("SECRET"))
          deployApp(appDir = ".", forceUpdate = TRUE)
        shell: Rscript {0}
