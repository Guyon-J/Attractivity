name: Deploy to shinyapps.io

on:
  push:
    branches: [ main, master ] # Déclenche le déploiement lors d'un push sur main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-r@v2
      
      - uses: r-lib/actions/setup-renv@v2 # Gère les dépendances si vous utilisez renv
        
      - name: Install rsconnect
        run: Rscript -e 'install.packages("rsconnect")'
        
      - name: Authorize and Deploy
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT_NAME }} # Votre nom d'utilisateur shinyapps
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "rsconnect::setAccountInfo(name='${{ env.SHINYAPPS_ACCOUNT }}', token='${{ env.SHINYAPPS_TOKEN }}', secret='${{ env.SHINYAPPS_SECRET }}')"
          Rscript -e "rsconnect::deployApp('.')"
